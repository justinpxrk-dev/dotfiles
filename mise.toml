[tools]
node = "latest"
"npm:pnpm" = "latest"
ruff = "latest"
stylua = "latest"
lua-language-server = "latest"
lefthook = "latest"
shellcheck = "latest"
shfmt = "latest"

[tasks."brew:install-packages"]
description = "Install Homebrew packages declared in ~/.Brewfile"
run = "./scripts/brew/install-packages.sh"

[tasks."git:install-submodules"]
description = "Initialise all git submodules and build/install their outputs"
run = "./scripts/git/install-submodules.sh"

[tasks."luarocks:install-rocks"]
description = "Install LuaRocks dependencies into the user tree"
run = "./scripts/luarocks/install-rocks.sh"

[tasks."macos:reload-launch-agent"]
description = "Reload a me.justinpxrk LaunchAgent by label (bootout then bootstrap), e.g. me.justinpxrk.dark-notify"
run = "./scripts/macos/reload-launch-agent.sh"

[tasks."macos:set-system-settings"]
description = "Apply macOS defaults and system preferences"
run = "./scripts/macos/set-system-settings.sh"

[tasks."spicetify:handle-theme-change"]
description = "Re-apply Spotify's Spicetify Catppuccin scheme (Mocha dark, Latte light) for the current light/dark mode; pass dark|light to force, omit to detect from system"
run = "./scripts/spicetify/handle-theme-change.sh"

[tasks."themes:handle-theme-change"]
description = "Apply per-appearance theme state (borders colors, delta Catppuccin theme, Spicetify scheme) for the current light/dark mode; pass dark|light to force, omit to detect from system"
run = "./scripts/themes/handle-theme-change.sh"

[tasks."themes:generate-base24-palette"]
description = "Generate Base24 dark and light palette YAML files"
run = "uv run ./scripts/themes/generate_base24_palette.py"

[tasks."tinted:apply-templates"]
description = "Build and install theme outputs (zsh, Ghostty, VS Code) from a Base24 scheme directory via tinted-builder"
run = "./scripts/tinted/apply-templates.sh"

[tasks."zsh:benchmark-startup"]
description = "Benchmark Zsh startup time with hyperfine (200 runs, 50 warmups)"
run = "./scripts/zsh/benchmark-startup.sh"
