# tmux configuration. Loaded from ~/.config/tmux/tmux.conf (tmux >= 3.1).

# --- Prefix ---------------------------------------------------------------
# Ctrl-a is easier to reach than the default Ctrl-b. Keep Ctrl-b working as a
# fallback so muscle memory / tutorials still function, and allow sending a
# literal Ctrl-a to the inner program by pressing the prefix twice.
set -g prefix C-a
bind C-a send-prefix

# --- General behaviour ----------------------------------------------------
set -g mouse on                 # click to select, drag borders to resize
setw -g mode-keys vi            # vi keys in copy mode (matches nvim/zsh setup)
set -g history-limit 50000      # deep scrollback
set -g base-index 1             # windows start at 1 (1 is closer than 0)
setw -g pane-base-index 1       # panes start at 1 to match
set -g renumber-windows on      # keep window numbers gapless after closing one
set -g focus-events on          # let nvim/zsh react to terminal focus changes

# Drop escape-time so pressing Esc in nvim is instant rather than waiting for
# a possible escape sequence.
set -sg escape-time 10

# --- Colors ---------------------------------------------------------------
# Assume a modern true-color terminal (Ghostty). RGB lets the Petrichor theme
# render exact colors instead of being quantized to 256.
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"

# --- Splits & windows -----------------------------------------------------
# | and - are mnemonic for the split direction; the default " and % are not.
# Open new splits/windows in the current pane's directory, not $HOME.
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# --- Pane navigation & resize --------------------------------------------
# vim-style hjkl movement; uppercase + -r (repeatable) to resize.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Copy mode (macOS clipboard) -----------------------------------------
# v/y mirror visual-select/yank; pipe the selection through pbcopy so yanked
# text lands on the macOS system clipboard, and the same on mouse drag-release.
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# --- Reload ---------------------------------------------------------------
# prefix + r re-sources this file without restarting the server.
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"

# --- Status bar -----------------------------------------------------------
# Restrained dark styling. Colors are deliberately plain so they read well on
# the Petrichor Dark palette; wiring this into the generated theme system is a
# future step.
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=colour235,fg=colour250"
set -g status-left "#[bold] #S #[default]"
set -g status-left-length 30
set -g status-right "#[fg=colour244]%Y-%m-%d #[fg=colour250]%H:%M "
setw -g window-status-current-style "bold,fg=colour255"
setw -g window-status-format " #I:#W "
setw -g window-status-current-format " #I:#W "
set -g pane-active-border-style "fg=colour244"
set -g pane-border-style "fg=colour238"
set -g message-style "bg=colour235,fg=colour255"
