name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup mise
        uses: jdx/mise-action@v4.0.1

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install node dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm run format:check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup mise
        uses: jdx/mise-action@v4.0.1

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python dependencies
        run: uv sync --dev

      - name: Lint
        run: pnpm run lint

  deploy:
    name: Deploy (macOS)
    needs: [format, lint]
    runs-on: macos-26
    steps:
      - name: Deploy dotfiles
        run: sh -c "$(curl -fsLS get.chezmoi.io)" -- init --apply justinpxrk-dev
