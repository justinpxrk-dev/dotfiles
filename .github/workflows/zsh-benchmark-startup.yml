name: Zsh Benchmark Startup

on:
  push:
    paths:
      - "dot_config/zsh/**"
  pull_request:
    paths:
      - "dot_config/zsh/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  benchmark:
    name: Zsh Benchmark Startup
    runs-on: macos-26
    timeout-minutes: 15
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Hard ceiling for mean interactive startup. Raise/lower this single value
      # to retune the gate once real CI numbers are observed.
      THRESHOLD_MS: 200
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Link checkout as chezmoi source dir
        run: |
          mkdir -p "$HOME/.local/share"
          ln -sfn "$GITHUB_WORKSPACE" "$HOME/.local/share/chezmoi"

      - name: Install chezmoi
        run: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b /usr/local/bin

      - name: Apply dotfiles
        run: chezmoi apply

      - name: Warm up shell
        # The first interactive shells do one-time work (zcompile *.zwc,
        # antidote bundle, compinit dump) that must not pollute the measurement.
        run: |
          for i in {1..3}; do zsh -i -l -c exit; done

      - name: Benchmark startup
        run: |
          hyperfine --warmup 50 --runs 200 --export-json result.json 'zsh -i -l -c exit'

      - name: Evaluate and report
        run: |
          mean_ms=$(jq '.results[0].mean * 1000' result.json)
          printf 'Mean startup: %.1f ms (limit %s ms)\n' "$mean_ms" "$THRESHOLD_MS"
          printf 'Mean startup: %.1f ms (limit %s ms)\n' "$mean_ms" "$THRESHOLD_MS" >>"$GITHUB_STEP_SUMMARY"
          awk -v m="$mean_ms" -v t="$THRESHOLD_MS" 'BEGIN { exit (m > t) }' \
            || { echo "::error::Zsh startup regressed above $THRESHOLD_MS ms"; exit 1; }
