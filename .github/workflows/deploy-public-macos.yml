name: Deploy Public (macOS)

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy Public (macOS)
    runs-on: macos-26
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Link checkout as chezmoi source dir
        run: |
          mkdir -p "$HOME/.local/share"
          ln -sfn "$GITHUB_WORKSPACE" "$HOME/.local/share/chezmoi"

      - name: Install chezmoi
        run: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b /usr/local/bin

      - name: Apply dotfiles
        run: chezmoi apply
