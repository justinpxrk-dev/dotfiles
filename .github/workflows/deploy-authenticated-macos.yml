name: Deploy Authenticated (macOS)

on:
  push:
  workflow_dispatch:
  schedule:
    - cron: "7 7,19 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy Authenticated (macOS)
    runs-on: macos-26
    timeout-minutes: 10
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Configure SSH for private submodules
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: |
            ${{ secrets.FONT_MONOLISA_DEPLOY_KEY }}
            ${{ secrets.MONOLISA_NERDFONT_PATCH_DEPLOY_KEY }}

      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Link checkout as chezmoi source dir
        run: |
          mkdir -p "$HOME/.local/share"
          ln -sfn "$GITHUB_WORKSPACE" "$HOME/.local/share/chezmoi"

      - name: Install chezmoi
        run: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b /usr/local/bin

      - name: Apply dotfiles
        run: chezmoi apply
